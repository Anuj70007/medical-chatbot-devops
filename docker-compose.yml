version: '3.9'

services:

  ml-service:
    build: ./ml-model
    container_name: ml-service
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    container_name: medical-backend
    ports:
      - "8081:8081"
    depends_on:
      - ml-service

  frontend:
    build: ./frontend
    container_name: medical-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
